<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Art pipeline — pilot A/B</title>
<style>
  body { background: #14110c; color: #d8cba8; font-family: Georgia, serif; margin: 20px; }
  h1 { font-size: 20px; color: #c9a84c; }
  h2 { font-size: 16px; color: #c9a84c; margin: 28px 0 8px; }
  .meta { font-size: 12px; color: #8a7f63; margin-bottom: 10px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
  .cell { text-align: center; }
  .cell .label { font-size: 11px; color: #8a7f63; margin-top: 4px; }
  .swatch-dark  { background: #221d12; border: 1px solid #3a3223; padding: 10px; display: inline-block; }
  .swatch-field { background: #4a5d3a; border: 1px solid #3a3223; padding: 10px; display: inline-block; }
  .portrait-chip { width: 52px; height: 52px; box-sizing: border-box; border: 2px solid #4488ff;
                   background: #1c2a1c; display: inline-flex; align-items: center; justify-content: center; }
  canvas { display: block; }
  button { background: #2a2416; color: #c9a84c; border: 1px solid #5a4c28; padding: 4px 10px;
           font-family: inherit; cursor: pointer; margin-top: 6px; }
  .err { color: #d06050; }
</style>
</head>
<body>
<h1>Art pipeline — knight pilot A/B</h1>
<div class="meta">Each version: background keyed out, trimmed, then rendered at battle-candidate
sizes with both scaling methods, over the game's dark UI tone and a field green. Judge at the
small sizes — that's where the game lives.</div>
<div id="out"></div>

<script>
const ASSETS = [
  { name: 'goblin brute — consistency test vs v3 (magenta key)', file: '../assets/raw/raw_enemy_goblin_brute.png', key: 'magenta' },
  { name: 'v3 — chunky + color (magenta key)',         file: '../assets/raw/raw_hero_knight_v3.png', key: 'magenta' },
  { name: 'v1 — detailed (gray bg, border-flood key)', file: '../assets/raw/raw_hero_knight_v1.png', key: 'flood' },
  { name: 'v2 — chunky (magenta key)',                 file: '../assets/raw/raw_hero_knight_v2.png', key: 'magenta' },
];
const SIZES = [96, 64, 48];

function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = () => rej(new Error('failed to load ' + src));
    img.src = src;
  });
}

function toCanvas(img) {
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  c.getContext('2d').drawImage(img, 0, 0);
  return c;
}

function keyMagenta(canvas) {
  const ctx = canvas.getContext('2d');
  const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const p = d.data;
  for (let i = 0; i < p.length; i += 4) {
    const r = p[i], g = p[i+1], b = p[i+2];
    const m = Math.max(r, b);
    if (m > 130 && g < 0.65 * m && Math.min(r, b) > 0.45 * m) p[i+3] = 0;
  }
  ctx.putImageData(d, 0, 0);
}

// Border flood key: BFS from every border pixel, removing the connected region whose color
// stays near the border's dominant color (tolerates the vignette via a local-step criterion).
function keyFlood(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const d = ctx.getImageData(0, 0, W, H);
  const p = d.data;
  const seen = new Uint8Array(W * H);
  const queue = [];
  let sr = 0, sg = 0, sb = 0, n = 0;
  const border = [];
  for (let x = 0; x < W; x++) { border.push(x, (H-1)*W + x); }
  for (let y = 0; y < H; y++) { border.push(y*W, y*W + W-1); }
  for (const idx of border) { sr += p[idx*4]; sg += p[idx*4+1]; sb += p[idx*4+2]; n++; }
  sr /= n; sg /= n; sb /= n;
  const nearSeed = i => {
    const dr = p[i*4]-sr, dg = p[i*4+1]-sg, db = p[i*4+2]-sb;
    return dr*dr + dg*dg + db*db < 70*70;
  };
  const nearPix = (i, j) => {
    const dr = p[i*4]-p[j*4], dg = p[i*4+1]-p[j*4+1], db = p[i*4+2]-p[j*4+2];
    return dr*dr + dg*dg + db*db < 28*28;
  };
  for (const idx of border) {
    if (!seen[idx] && nearSeed(idx)) { seen[idx] = 1; queue.push(idx); }
  }
  while (queue.length) {
    const i = queue.pop();
    p[i*4+3] = 0;
    const x = i % W, y = (i / W) | 0;
    const neighbors = [];
    if (x > 0) neighbors.push(i-1);
    if (x < W-1) neighbors.push(i+1);
    if (y > 0) neighbors.push(i-W);
    if (y < H-1) neighbors.push(i+W);
    for (const j of neighbors) {
      if (!seen[j] && nearSeed(j) && nearPix(j, i)) { seen[j] = 1; queue.push(j); }
    }
  }
  ctx.putImageData(d, 0, 0);
}

function trim(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const p = ctx.getImageData(0, 0, W, H).data;
  let minX = W, minY = H, maxX = -1, maxY = -1;
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    if (p[(y*W + x)*4 + 3] > 8) {
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    }
  }
  if (maxX < 0) return canvas;
  const out = document.createElement('canvas');
  out.width = maxX - minX + 1; out.height = maxY - minY + 1;
  out.getContext('2d').drawImage(canvas, -minX, -minY);
  return out;
}

function scaled(src, targetH, smooth) {
  const scale = targetH / src.height;
  const c = document.createElement('canvas');
  c.width = Math.max(1, Math.round(src.width * scale));
  c.height = targetH;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = smooth;
  if (smooth) ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(src, 0, 0, c.width, c.height);
  return c;
}

function portraitCrop(src, box) {
  const c = document.createElement('canvas');
  c.width = box; c.height = box;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  const sw = src.width * 0.72, sh = sw;
  const sx = (src.width - sw) / 2, sy = 0;
  ctx.drawImage(src, sx, sy, sw, sh, 0, 0, box, box);
  return c;
}

function cell(node, label) {
  const div = document.createElement('div');
  div.className = 'cell';
  div.appendChild(node);
  const l = document.createElement('div');
  l.className = 'label';
  l.textContent = label;
  div.appendChild(l);
  return div;
}

async function run() {
  const out = document.getElementById('out');
  for (const asset of ASSETS) {
    const h2 = document.createElement('h2');
    h2.textContent = asset.name;
    out.appendChild(h2);
    try {
      const img = await loadImage(asset.file);
      const c = toCanvas(img);
      if (asset.key === 'magenta') keyMagenta(c); else keyFlood(c);
      const t = trim(c);
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = `source ${img.width}×${img.height} → trimmed sprite ${t.width}×${t.height}`;
      out.appendChild(meta);

      for (const swatchClass of ['swatch-dark', 'swatch-field']) {
        const row = document.createElement('div');
        row.className = 'row';
        for (const size of SIZES) {
          for (const smooth of [false, true]) {
            const wrap = document.createElement('div');
            wrap.className = swatchClass;
            wrap.appendChild(scaled(t, size, smooth));
            row.appendChild(cell(wrap, `${size}px ${smooth ? 'smooth' : 'nearest'}`));
          }
        }
        const chip = document.createElement('div');
        chip.className = 'portrait-chip';
        chip.appendChild(portraitCrop(t, 44));
        row.appendChild(cell(chip, '52px portrait crop'));
        out.appendChild(row);
        out.appendChild(document.createElement('br'));
      }

      const dl = document.createElement('button');
      dl.textContent = 'download keyed + trimmed PNG';
      dl.onclick = () => {
        const a = document.createElement('a');
        a.download = asset.file.split('/').pop().replace('raw_', 'keyed_');
        a.href = t.toDataURL('image/png');
        a.click();
      };
      out.appendChild(dl);
    } catch (e) {
      const err = document.createElement('div');
      err.className = 'err';
      err.textContent = e.message + ' — is the page served over http (not file://)?';
      out.appendChild(err);
    }
  }
}
run();
</script>
</body>
</html>
