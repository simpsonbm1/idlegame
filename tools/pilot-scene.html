<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pilot scene — the gates</title>
<style>
  body { background: #14110c; color: #d8cba8; font-family: Georgia, serif; margin: 20px; }
  h1 { font-size: 20px; color: #c9a84c; }
  .meta { font-size: 12px; color: #8a7f63; margin-bottom: 14px; }
  #panel {
    width: 680px; height: 520px; box-sizing: border-box;
    border: 52px solid transparent; position: relative; display: none;
  }
  #scene {
    position: absolute; inset: 0; overflow: hidden;
    background-repeat: no-repeat; background-size: cover; background-position: 0% 62%;
    image-rendering: pixelated;
  }
  #scene img { image-rendering: pixelated; position: absolute; }
  .info { position: absolute; text-align: center; width: 96px; }
  .nameplate { font-size: 13px; color: #f0d890; text-shadow: 1px 1px 0 #1a1408, -1px 1px 0 #1a1408, 1px -1px 0 #1a1408, -1px -1px 0 #1a1408; margin-bottom: 3px; }
  .hpbar { width: 92px; height: 11px; margin: 0 auto; background: #2a1512;
           border: 2px solid #171008; box-sizing: border-box; }
  .hpfill { height: 100%; }
  .hp-hero  { background: linear-gradient(#7dc95e, #4e9636); }
  .hp-enemy { background: linear-gradient(#d95c4a, #a83a2c); }
  .slot { position: absolute; border: 2px solid rgba(233, 196, 106, 0.55);
          border-radius: 6px; background: rgba(233, 196, 106, 0.12); }
  .shadow { position: absolute; background: rgba(10, 8, 4, 0.4); border-radius: 50%;
            filter: blur(2px); }
</style>
</head>
<body>
<h1>Pilot test scene — at the gates</h1>
<div class="meta">Units are seated by computed foot anchors (weighted centroid of the bottom
pixel rows — weapon overhang excluded), not by their trimmed bounding boxes. Slots, HP bars,
and ground shadows all register to the same anchor.</div>
<div id="panel">
  <div id="scene"></div>
</div>
<div id="status" class="meta">processing raws…</div>

<script>
function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = () => rej(new Error('failed to load ' + src));
    img.src = src;
  });
}
function toCanvas(img) {
  const c = document.createElement('canvas');
  c.width = img.width; c.height = img.height;
  c.getContext('2d').drawImage(img, 0, 0);
  return c;
}
function keyMagenta(canvas) {
  const ctx = canvas.getContext('2d');
  const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const p = d.data;
  for (let i = 0; i < p.length; i += 4) {
    const r = p[i], g = p[i+1], b = p[i+2];
    const m = Math.max(r, b);
    if (m > 130 && g < 0.65 * m && Math.min(r, b) > 0.45 * m) p[i+3] = 0;
  }
  ctx.putImageData(d, 0, 0);
}
function trim(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const p = ctx.getImageData(0, 0, W, H).data;
  let minX = W, minY = H, maxX = -1, maxY = -1;
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    if (p[(y*W + x)*4 + 3] > 8) {
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    }
  }
  const out = document.createElement('canvas');
  out.width = maxX - minX + 1; out.height = maxY - minY + 1;
  out.getContext('2d').drawImage(canvas, -minX, -minY);
  return out;
}

// Foot anchor: where the character actually stands, independent of weapon overhang.
// ax = alpha-weighted centroid X of the bottom 12% of opaque pixels (feet dominate the
// mass there; a thin club tip barely shifts it). ay = lowest opaque row within a narrow
// column band around ax (so a weapon tip dipping below the feet elsewhere is ignored).
function computeAnchor(c) {
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  const p = ctx.getImageData(0, 0, W, H).data;
  const bandTop = Math.floor(H * 0.88);
  let sx = 0, n = 0;
  for (let y = bandTop; y < H; y++) for (let x = 0; x < W; x++) {
    if (p[(y*W + x)*4 + 3] > 8) { sx += x; n++; }
  }
  const ax = n ? sx / n : W / 2;
  const half = W * 0.14;
  let ay = H - 1;
  outer:
  for (let y = H - 1; y >= 0; y--) {
    for (let x = Math.max(0, Math.floor(ax - half)); x < Math.min(W, Math.ceil(ax + half)); x++) {
      if (p[(y*W + x)*4 + 3] > 8) { ay = y; break outer; }
    }
  }
  return { ax, ay };
}

// Seat a unit so its foot anchor lands exactly at (feetX, feetBottom) in scene coords.
function placeUnit(scene, sprite, name, hpClass, hpPct, feetX, feetBottom, targetH) {
  const scale = targetH / sprite.height;
  const { ax, ay } = computeAnchor(sprite);

  const slot = document.createElement('div');
  slot.className = 'slot';
  slot.style.cssText = `left:${feetX - 58}px; bottom:${feetBottom - 14}px; width:116px; height:32px;`;
  scene.appendChild(slot);

  const shadow = document.createElement('div');
  shadow.className = 'shadow';
  shadow.style.cssText = `left:${feetX - 34}px; bottom:${feetBottom - 7}px; width:68px; height:16px;`;
  scene.appendChild(shadow);

  const img = document.createElement('img');
  img.src = sprite.toDataURL('image/png');
  img.style.height = targetH + 'px';
  img.style.left = (feetX - ax * scale) + 'px';
  img.style.bottom = (feetBottom - (sprite.height - ay) * scale) + 'px';
  scene.appendChild(img);

  const info = document.createElement('div');
  info.className = 'info';
  info.style.left = (feetX - 48) + 'px';
  info.style.bottom = (feetBottom + ay * scale + 6) + 'px';
  const plate = document.createElement('div');
  plate.className = 'nameplate';
  plate.textContent = name;
  const bar = document.createElement('div');
  bar.className = 'hpbar';
  const fill = document.createElement('div');
  fill.className = 'hpfill ' + hpClass;
  fill.style.width = hpPct + '%';
  bar.appendChild(fill);
  info.appendChild(plate);
  info.appendChild(bar);
  scene.appendChild(info);

  return { ax: Math.round(ax), ay: Math.round(ay), w: sprite.width, h: sprite.height };
}

async function run() {
  const status = document.getElementById('status');
  try {
    const [knightImg, goblinImg, bgImg, frameImg] = await Promise.all([
      loadImage('../assets/raw/raw_hero_knight_v3.png'),
      loadImage('../assets/raw/raw_enemy_goblin_brute.png'),
      loadImage('../assets/raw/raw_bg_battlefield_v1.png'),
      loadImage('../assets/raw/raw_ui_frame.png'),
    ]);
    const knight = toCanvas(knightImg); keyMagenta(knight);
    const goblin = toCanvas(goblinImg); keyMagenta(goblin);
    const frame  = toCanvas(frameImg);  keyMagenta(frame);
    const knightT = trim(knight), goblinT = trim(goblin);

    const panel = document.getElementById('panel');
    panel.style.borderImage = `url(${frame.toDataURL('image/png')}) 280 / 52px stretch`;
    panel.style.display = 'block';

    const scene = document.getElementById('scene');
    scene.style.backgroundImage = `url(${bgImg.src})`;

    const ka = placeUnit(scene, knightT, 'Knight', 'hp-hero', 100, 150, 96, 118);
    const ga = placeUnit(scene, goblinT, 'Goblin Brute', 'hp-enemy', 64, 440, 86, 128);

    status.textContent =
      `knight ${ka.w}×${ka.h} anchor (${ka.ax}, ${ka.ay}) · goblin ${ga.w}×${ga.h} anchor (${ga.ax}, ${ga.ay})` +
      ` — anchors will ship in the pipeline's sprite manifest`;
  } catch (e) {
    status.textContent = e.message + ' — serve over http, not file://';
    status.style.color = '#d06050';
  }
}
run();
</script>
</body>
</html>
