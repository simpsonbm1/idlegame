<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Kingdom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game">
        <h1>Idle Kingdom</h1>

        <div id="layout">
            <div id="admin-panel">
                <div id="resources">
                    <div class="resource">
                        <span class="resource-label">Gold</span>
                        <span id="gold-display">50</span>
                    </div>
                    <div class="resource">
                        <span class="resource-label">Per second</span>
                        <span id="gps-display">0</span>
                        <span id="siege-indicator"></span>
                    </div>
                    <div class="resource">
                        <span class="resource-label">Legacy</span>
                        <span id="legacy-display">0</span>
                    </div>
                </div>

                <div class="panel-section" id="kingdom-hp"></div>

                <div id="left-panel-dynamic"></div>

                <div class="panel-section">
                    <div class="panel-label">Game Speed</div>
                    <div class="speed-buttons" id="speed-buttons"></div>
                </div>

                <div class="panel-section">
                    <div class="panel-label">Motion</div>
                    <div class="speed-buttons" id="motion-toggle"></div>
                </div>

                <div class="panel-section">
                    <div class="panel-label">Sound</div>
                    <div class="speed-buttons" id="sound-controls"></div>
                </div>
            </div>

            <div id="town-panel">
                <div id="town-buildings">
                    <div id="buildings">
                        <h2>Buildings</h2>
                        <div id="building-list"></div>
                    </div>
                </div>
                <div id="town-square">
                    <div id="recruit-section">
                        <h2>Town Square</h2>
                        <div id="recruit-pool"></div>
                    </div>
                </div>
            </div>

            <div id="battle-panel">
                <div class="raid-status-bar" id="raid-status-bar"></div>

                <div class="battle-squads">
                    <div class="battle-squad-area">
                        <div class="section-heading">Defenders</div>
                        <div class="battle-squad" id="heroSquad"></div>
                    </div>
                    <div class="battle-squad-area battle-squad-area--enemy">
                        <div class="section-heading">Enemies</div>
                        <div class="battle-squad" id="enemySquad"></div>
                    </div>
                </div>

                <div class="section-heading" style="margin-top:20px;">Hero Recruits</div>
                <div id="hero-recruit-pool"></div>
            </div>
        </div>
    </div>

    <div id="run-summary-overlay" class="hidden">
        <div id="run-summary-panel">
            <div id="run-summary-content"></div>
        </div>
    </div>

    <!-- M15 scene view (T2/T3 overhaul, built incrementally). Hidden until
         toggled; the classic #layout above stays the working default until the
         scene is fully playable. Increment 1: continuous backdrop + town vista
         (buildings on fixed plots from real state) + HUD chips. -->
    <div id="scene" class="hidden" aria-hidden="true">
        <div id="scene-bg"></div>
        <div id="scene-esc-wash"></div>
        <div id="scene-vista"></div>
        <div id="scene-battle"></div>
        <div id="scene-crowd"></div>
        <div id="scene-hud"></div>
        <div id="scene-fx"></div>
        <div id="scene-drawer" class="hidden">
            <span class="scene-drawer-close" data-action="closeScenePlot" title="Close">✕</span>
            <div id="scene-drawer-body"></div>
        </div>
        <div id="scene-note">Scene view — work in progress</div>
    </div>
    <button id="scene-toggle" data-action="toggleSceneView" title="Toggle the work-in-progress scene view">⛶ Scene view</button>

    <script src="game.js"></script>
</body>
</html>
