<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idle Kingdom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game">
        <h1>Idle Kingdom</h1>

        <div id="layout">
            <div id="admin-panel">
                <div id="resources">
                    <div class="resource">
                        <span class="resource-label">Gold</span>
                        <span id="gold-display">50</span>
                    </div>
                    <div class="resource">
                        <span class="resource-label">Per second</span>
                        <span id="gps-display">0</span>
                        <span id="siege-indicator"></span>
                    </div>
                </div>

                <div class="panel-section" id="kingdom-hp"></div>

                <div id="left-panel-dynamic"></div>

                <div class="panel-section">
                    <div class="panel-label">Dev Speed</div>
                    <div class="speed-buttons">
                        <button class="btn-speed btn-speed--active" id="speed-1"   onclick="setGameSpeed(1)">1×</button>
                        <button class="btn-speed"                   id="speed-10"  onclick="setGameSpeed(10)">10×</button>
                        <button class="btn-speed"                   id="speed-50"  onclick="setGameSpeed(50)">50×</button>
                        <button class="btn-speed"                   id="speed-100" onclick="setGameSpeed(100)">100×</button>
                    </div>
                </div>
            </div>

            <div id="town-panel">
                <div id="town-buildings">
                    <div id="buildings">
                        <h2>Buildings</h2>
                        <div id="building-list"></div>
                    </div>
                </div>
                <div id="town-square">
                    <div id="recruit-section">
                        <h2>Town Square</h2>
                        <div id="recruit-pool"></div>
                    </div>
                </div>
            </div>

            <div id="battle-panel">
                <div class="raid-status-bar" id="raid-status-bar"></div>

                <div class="battle-squads">
                    <div class="battle-squad-area">
                        <div class="section-heading">Defenders</div>
                        <div class="battle-squad" id="heroSquad"></div>
                    </div>
                    <div class="battle-squad-area battle-squad-area--enemy">
                        <div class="section-heading">Enemies</div>
                        <div class="battle-squad" id="enemySquad"></div>
                    </div>
                </div>

                <div class="section-heading" style="margin-top:20px;">Hero Recruits</div>
                <div id="hero-recruit-pool"></div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
